name: Daily Refresh

on:
  schedule:
    # Runs every weekday at 07:00 UTC (after European markets open)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: screener
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Read existing tickers
        id: tickers
        run: |
          python - <<'EOF'
          import json, os
          path = "data/screener.json"
          if not os.path.exists(path):
              print("No screener.json — nothing to refresh.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("tickers=\n")
          else:
              with open(path) as f:
                  data = json.load(f)
              tickers = ",".join(data.keys())
              print(f"Refreshing: {tickers}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"tickers={tickers}\n")
          EOF

      - name: Fetch screener fundamentals
        if: steps.tickers.outputs.tickers != ''
        env:
          TICKERS:     ${{ steps.tickers.outputs.tickers }}
          MODE:        replace
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python fetch_screener.py

      - name: Build HTML
        if: steps.tickers.outputs.tickers != ''
        run: python build_html.py

      - name: Commit & push
        if: steps.tickers.outputs.tickers != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/screener.json
          if git diff --staged --quiet; then
            echo "Sem alterações."
            exit 0
          fi
          git commit -m "chore: daily refresh"
          git pull --rebase origin main
          git push origin main
